name: Release

on:
  push:
    branches:
      - main

jobs:
  # Read the version from pubspec.yaml and skip if this version is
  # already tagged (i.e. the merge didn't bump the version).
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to check existing tags

      - name: Read version from pubspec.yaml
        id: read
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.read.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # Android release APK.
  build-android:
    name: Build Android release APK
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.exists == 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  # iOS build (unsigned). A signed IPA for TestFlight requires Apple
  # certificates stored in GitHub secrets — see CLAUDE.md for setup steps.
  build-ios:
    name: Build iOS release
    runs-on: macos-latest
    needs: version
    if: needs.version.outputs.exists == 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code signing)
        run: flutter build ios --no-codesign --release

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r hookup-ios-unsigned.ipa Payload/

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/hookup-ios-unsigned.ipa

  # Create a GitHub Release with both artifacts attached.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-android, build-ios]
    if: needs.version.outputs.exists == 'false'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: artifacts/

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-release
          path: artifacts/

      - name: Rename artifacts with version
        run: |
          mv artifacts/app-release.apk artifacts/hookup-${{ needs.version.outputs.version }}.apk
          mv artifacts/hookup-ios-unsigned.ipa artifacts/hookup-${{ needs.version.outputs.version }}-ios-unsigned.ipa

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/hookup-${{ needs.version.outputs.version }}.apk
            artifacts/hookup-${{ needs.version.outputs.version }}-ios-unsigned.ipa
