name: Build

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Tests must pass before any artifact is built.
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test

  # Android debug APK — ready to sideload on any Android device.
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: hookup-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Distribute to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal
          file: build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: "Branch: ${{ github.ref_name }} — ${{ github.sha }}"

  # iOS build — unsigned, proves the app compiles cleanly for iOS.
  # For a signed IPA deployable via TestFlight, Apple signing certificates
  # must be added to GitHub secrets (see CLAUDE.md).
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_nearby_connections_plus iOS podspec and Swift header import
        run: |
          plugin_dir=$(find "$HOME/.pub-cache" -type d \
                       -path "*/flutter_nearby_connections_plus-*/ios" 2>/dev/null | head -1)
          if [ -z "$plugin_dir" ]; then
            echo "Plugin iOS dir not found — skipping patch"; exit 0
          fi
          # 1. Create correctly-named podspec with updated s.name
          src="$plugin_dir/flutter_nearby_connections.podspec"
          dst="$plugin_dir/flutter_nearby_connections_plus.podspec"
          if [ -f "$src" ] && [ ! -f "$dst" ]; then
            sed "s/s\.name\s*=\s*'flutter_nearby_connections'/s.name             = 'flutter_nearby_connections_plus'/" \
              "$src" > "$dst"
            echo "Created podspec: $dst"
          fi
          # 2. Fix the Swift bridging header import in the ObjC plugin file
          m_file="$plugin_dir/Classes/FlutterNearbyConnectionsPlugin.m"
          if [ -f "$m_file" ]; then
            sed -i '' \
              's/flutter_nearby_connections\/flutter_nearby_connections-Swift\.h/flutter_nearby_connections_plus\/flutter_nearby_connections_plus-Swift.h/g;
               s/"flutter_nearby_connections-Swift\.h"/"flutter_nearby_connections_plus-Swift.h"/g' \
              "$m_file"
            echo "Patched Swift header import in: $m_file"
          fi

      - name: Build iOS (no code signing)
        run: flutter build ios --no-codesign --debug

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r hookup-ios-unsigned.ipa Payload/

      - name: Upload iOS build
        uses: actions/upload-artifact@v6
        with:
          name: hookup-ios-unsigned-${{ github.sha }}
          path: build/ios/iphoneos/hookup-ios-unsigned.ipa
          retention-days: 14
