name: Build

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  # Tests must pass before any artifact is built.
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test

  # Android debug APK — ready to sideload on any Android device.
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hookup-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  # iOS build — unsigned, proves the app compiles cleanly for iOS.
  # For a signed IPA deployable via TestFlight, Apple signing certificates
  # must be added to GitHub secrets (see CLAUDE.md).
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code signing)
        run: flutter build ios --no-codesign --debug

      - name: Archive iOS build
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r hookup-ios-unsigned.ipa Payload/

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: hookup-ios-unsigned-${{ github.sha }}
          path: build/ios/iphoneos/hookup-ios-unsigned.ipa
          retention-days: 14
